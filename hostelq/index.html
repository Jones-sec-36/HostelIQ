<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HostelQ - Smart Hostel Room Booking with Virtual Queue</title>

    <meta name="description"
        content="HostelQ is the first virtual queue-based hostel room booking platform, offering a Tatkal-style booking system with real-time room status, group booking, and instant confirmations.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Background -->
    <div class="bg-mesh">
        <div class="mesh-orb orb-1"></div>
        <div class="mesh-orb orb-2"></div>
        <div class="mesh-orb orb-3"></div>
    </div>

    <!-- Application Shell -->
    <div id="app-shell">

        <!-- Navbar -->
        <nav id="main-nav" class="nav-glass">

            <div class="nav-brand" id="nav-brand-btn">
                <div class="brand-icon">HQ</div>
                <span class="brand-name">
                    Hostel<span class="text-accent">Q</span>
                </span>
            </div>

            <div class="nav-menu" id="nav-menu">

                <a href="#/" class="nav-link active">
                    Home
                </a>

                <a href="#/dashboard"
                   class="nav-link hidden"
                   id="student-dash-link">
                    My Dashboard
                </a>

                <a href="#/admin"
                   class="nav-link"
                   id="admin-dash-link">
                    Admin Console
                </a>

                <button
                    class="btn-theme"
                    id="theme-toggle-btn"
                    aria-label="Toggle Theme">
                </button>

                <div
                    class="auth-btn-container"
                    id="auth-nav-container">
                </div>

            </div>

            <!-- Mobile Menu -->
            <button
                class="mobile-nav-toggle"
                id="mobile-toggle"
                aria-label="Toggle Navigation">

                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>

            </button>

        </nav>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Main App -->
        <main id="app-root">

            <div class="loading-spinner-container">
                <div class="loading-spinner"></div>
                <p>Initializing HostelQ...</p>
            </div>

        </main>

        <!-- Footer -->
        <footer id="app-footer">

            <div class="footer-content">

                <p>
                    &copy; 2026 HostelQ.
                    All rights reserved.
                    Designed for Premium Student Experiences.
                </p>

                <div class="footer-links">

                    <a href="#/terms">Terms of Service</a>

                    <a href="#/privacy">Privacy Policy</a>

                    <a href="#/support">Support Helpdesk</a>

                </div>

            </div>

        </footer>

    </div>

    <!-- Supabase SDK & Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <!-- SheetJS for Excel Import -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="js/app.js"></script>

</body>
</html>
